      max_current_a: 85.0
    - temp_c: 40.0
      max_current_a: 65.0
    - temp_c: 45.0
      max_current_a: 55.0
    - temp_c: 50.0
      max_current_a: 45.0
    - temp_c: 55.0
      max_current_a: 40.0
    - temp_c: 60.0
      max_current_a: 35.0
    - temp_c: 65.0
      max_current_a: 0.0
